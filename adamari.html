<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adamari 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --rose-deep: #8b1a3a;
  --rose-mid:  #c23b5e;
  --rose-soft: #f472a0;
  --rose-pale: #fce4ec;
  --gold:      #d4a853;
  --gold-light:#f0d080;
  --cream:     #fff5f7;
  --dark:      #1a0010;
}

body {
  background: var(--dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
}

#bg-canvas { position: fixed; inset: 0; z-index: 0; }

/* ── Floating petals ── */
.petal {
  position: fixed;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform: translateY(-40px) rotate(0deg) scale(1);   opacity: 0; }
  10%  { opacity: .85; }
  90%  { opacity: .6; }
  100% { transform: translateY(110vh) rotate(540deg) scale(.5); opacity: 0; }
}

/* ── Main stage ── */
.stage {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

/* ── Decorative top border ── */
.ornament {
  font-size: clamp(18px, 3vw, 26px);
  color: var(--gold);
  letter-spacing: 12px;
  opacity: 0;
  animation: fadeUp .8s ease .3s forwards;
  filter: drop-shadow(0 0 8px rgba(212,168,83,0.6));
}

/* ── Name ── */
.name {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(68px, 14vw, 130px);
  background: linear-gradient(135deg, var(--gold-light), var(--rose-soft), var(--gold), var(--rose-mid), var(--gold-light));
  background-size: 300% 300%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: nameShimmer 5s ease infinite, nameIn 1s cubic-bezier(.36,1.56,.64,1) .1s both;
  filter: drop-shadow(0 0 30px rgba(244,114,160,0.5));
  line-height: 1.1;
}
@keyframes nameShimmer {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
@keyframes nameIn {
  from { opacity:0; transform: scale(.4) translateY(-30px); }
  to   { opacity:1; transform: none; }
}

/* ── Subtitle ── */
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(13px, 2.2vw, 18px);
  color: var(--gold-light);
  letter-spacing: 4px;
  opacity: 0;
  animation: fadeUp .8s ease .7s forwards;
  text-shadow: 0 0 18px rgba(212,168,83,0.5);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

/* ── Panda ── */
.panda-wrap {
  cursor: pointer;
  animation: floatPanda 4s ease-in-out infinite;
  filter: drop-shadow(0 0 28px rgba(194,59,94,0.5));
  transition: filter .3s;
  opacity: 0;
  animation: floatPanda 4s ease-in-out infinite, pandaIn .9s ease .4s forwards;
}
.panda-wrap:hover { filter: drop-shadow(0 0 55px rgba(244,114,160,0.9)); }
@keyframes pandaIn { from{opacity:0;transform:scale(.6)} to{opacity:1;transform:none} }
@keyframes floatPanda {
  0%,100% { transform: translateY(0) rotate(-1.5deg); }
  50%      { transform: translateY(-16px) rotate(1.5deg); }
}
.arm-l { transform-origin: 130px 330px; animation: waveL 1.7s ease-in-out infinite alternate; }
.arm-r { transform-origin: 370px 330px; animation: waveR 1.7s ease-in-out infinite alternate; }
@keyframes waveL { from{transform:rotate(0deg)} to{transform:rotate(-45deg)} }
@keyframes waveR { from{transform:rotate(0deg)} to{transform:rotate(45deg)} }

/* ── Heart pulse ── */
.heart-badge {
  font-size: 26px;
  display: inline-block;
  animation: heartPulse 1.1s ease-in-out infinite;
  filter: drop-shadow(0 0 10px rgba(244,114,160,0.8));
}
@keyframes heartPulse {
  0%,100% { transform: scale(1); }
  40%     { transform: scale(1.3); }
  60%     { transform: scale(1.1); }
}

/* ── Buttons ── */
.controls {
  display: flex; gap: 10px; margin-top: 14px;
  flex-wrap: wrap; justify-content: center;
  opacity: 0; animation: fadeUp .8s ease 1.3s forwards;
}
.btn {
  padding: 9px 20px; border-radius: 30px;
  border: 1.5px solid rgba(212,168,83,0.45);
  background: rgba(139,26,58,0.18);
  color: var(--gold-light);
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .25s; letter-spacing: .5px;
  backdrop-filter: blur(6px);
}
.btn:hover {
  background: rgba(194,59,94,0.3); border-color: var(--gold);
  color: #fff; transform: scale(1.08);
  box-shadow: 0 0 20px rgba(194,59,94,0.5);
}
.btn:active { transform: scale(.96); }

/* ── Flying particles ── */
.particle {
  position: fixed; pointer-events: none; z-index: 20;
  animation: particleFly 2.2s ease-out forwards;
}
@keyframes particleFly {
  0%   { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-180px) scale(.2); }
}
.confetti-piece {
  position: fixed; pointer-events: none; z-index: 20;
  animation: confFall 3s ease-in forwards;
}
@keyframes confFall {
  0%   { opacity:1; transform: translateY(-10px) rotate(0deg); }
  100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
}
</style>
</head>

<script>
/* ── Background canvas ── */
const cv = document.getElementById('bg-canvas');
const ctx = cv.getContext('2d');
let W, H;
const STARS = [];
const NEBULAS = [
  { ox:.15, oy:.25, rx:220, ry:150, c1:'rgba(194,59,94,0.22)', c2:'rgba(80,0,30,0.08)' },
  { ox:.72, oy:.60, rx:260, ry:180, c1:'rgba(212,168,83,0.18)', c2:'rgba(80,30,0,0.06)' },
  { ox:.45, oy:.82, rx:200, ry:140, c1:'rgba(244,114,160,0.18)', c2:'rgba(80,0,40,0.06)' },
  { ox:.85, oy:.18, rx:180, ry:130, c1:'rgba(194,59,94,0.14)', c2:'rgba(60,0,20,0.05)' },
  { ox:.10, oy:.68, rx:240, ry:160, c1:'rgba(212,168,83,0.14)', c2:'rgba(60,20,0,0.05)' },
];
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
function buildStars() {
  STARS.length = 0;
  for (let i = 0; i < 280; i++) {
    STARS.push({
      x: Math.random(), y: Math.random(),
      r: .3 + Math.random() * 1.7,
      a: Math.random() * Math.PI * 2,
      da: .008 + Math.random() * .02,
      c: ['#fff','#ffd0e8','#ffeedd','#ffccaa','#ffe0b0'][Math.floor(Math.random()*5)],
    });
  }
}
function drawBg(t) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a0010'; ctx.fillRect(0,0,W,H);
  NEBULAS.forEach((n,i) => {
    const x=n.ox*W, y=n.oy*H, r=Math.max(n.rx,n.ry);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,n.c1); g.addColorStop(.5,n.c2); g.addColorStop(1,'transparent');
    ctx.save(); ctx.translate(x,y); ctx.rotate(t*.00005*(i%2?-1:1));
    ctx.scale(n.rx/r, n.ry/r);
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill(); ctx.restore();
  });
  STARS.forEach(s => {
    s.a+=s.da;
    const alpha=.2+.8*Math.abs(Math.sin(s.a));
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=s.c; ctx.globalAlpha=alpha; ctx.fill();
  });
  ctx.globalAlpha=1;
}
function loop(t){ drawBg(t); requestAnimationFrame(loop); }
resize(); buildStars();
window.addEventListener('resize',()=>{ resize(); buildStars(); });
requestAnimationFrame(loop);

/* ── Floating petals on load ── */
const PETAL_SVGS = [
  `<svg viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="15" cy="20" rx="10" ry="18" fill="#c23b5e" opacity=".85"/></svg>`,
  `<svg viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg"><ellipse cx="13" cy="18" rx="9" ry="16" fill="#e05580" opacity=".75"/></svg>`,
  `<svg viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg"><ellipse cx="10" cy="14" rx="7" ry="12" fill="#f472a0" opacity=".65"/></svg>`,
];
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  const size = 14 + Math.random()*22;
  el.style.cssText = `left:${Math.random()*100}vw;top:-40px;width:${size}px;height:${size*1.4}px;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*2}s;`;
  el.innerHTML = PETAL_SVGS[Math.floor(Math.random()*PETAL_SVGS.length)];
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 16000);
}
setInterval(spawnPetal, 600);
for(let i=0;i<8;i++) setTimeout(spawnPetal, i*300);

/* ── Particles ── */
function pandaClick(e) { launchHearts(e.clientX, e.clientY); }

function spawnParticle(x,y,txt,dur) {
  const el=document.createElement('div');
  el.className='particle';
  el.style.cssText=`left:${x}px;top:${y}px;font-size:${18+Math.random()*12}px;animation-duration:${dur}s;`;
  el.textContent=txt; document.body.appendChild(el);
  setTimeout(()=>el.remove(), dur*1000+300);
}
function launchHearts(cx,cy) {
  const items=['💖','💗','💕','💓','🌹','♥'];
  const bx=cx||window.innerWidth/2, by=cy||window.innerHeight/2;
  for(let i=0;i<14;i++) setTimeout(()=>spawnParticle(
    bx+(Math.random()-.5)*140, by+(Math.random()-.5)*90,
    items[Math.floor(Math.random()*items.length)], 1.8+Math.random()
  ), i*50);
}
function launchRoses() {
  const items=['🌹','🌷','🌸','💮','🏵️','💐'];
  for(let i=0;i<16;i++) setTimeout(()=>spawnParticle(
    Math.random()*window.innerWidth,
    window.innerHeight*.2+Math.random()*window.innerHeight*.5,
    items[Math.floor(Math.random()*items.length)], 2.2+Math.random()
  ), i*70);
}
function launchSparkles() {
  const items=['✨','⭐','💫','🌟','✦'];
  for(let i=0;i<12;i++) setTimeout(()=>spawnParticle(
    Math.random()*window.innerWidth,
    window.innerHeight*.3+Math.random()*window.innerHeight*.4,
    items[Math.floor(Math.random()*items.length)], 2+Math.random()
  ), i*80);
}
function launchConfetti() {
  const colors=['#c23b5e','#f472a0','#d4a853','#f0d080','#fff','#ffaaccaa','#ffee99'];
  for(let i=0;i<80;i++) {
    const el=document.createElement('div');
    el.className='confetti-piece';
    const s=6+Math.random()*10;
    el.style.cssText=`left:${5+Math.random()*90}vw;top:-10px;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()*1}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}
</script>
</body>
